version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: soundsync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DBNAME:-soundsync}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - soundsync_net

  mongo:
    image: mongo:7.0
    container_name: soundsync_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-rootpassword}
      MONGO_INITDB_DATABASE: soundsync
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./database/mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - soundsync_net

  transit-poller:
    build: ./transit-poller
    container_name: soundsync_poller
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      OBA_API_KEY: ${OBA_API_KEY:-TEST}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${PG_DBNAME:-soundsync}
      DB_USER: ${PG_USER:-postgres}
      DB_PASSWORD: ${PG_PASSWORD:-postgres}
    networks:
      - soundsync_net

  mongo-express:
    image: mongo-express:1.0
    container_name: soundsync_mongo_express
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-rootpassword}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-root}:${MONGO_INITDB_ROOT_PASSWORD:-rootpassword}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8081:8081"
    networks:
      - soundsync_net

volumes:
  mongo_data:
    name: soundsync_mongo_data
  postgres_data:
    name: soundsync_postgres_data

networks:
  soundsync_net:
    name: soundsync_network
